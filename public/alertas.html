<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santa Cruz Segura Predictiva - Alertas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/js/supabase.js"></script>
<style>
  :root {
    --verde: #1a6b2f;
    --verde-medio: #2d8a47;
    --verde-claro: #4caf50;
    --verde-suave: #e8f5e9;
    --naranja: #f5a623;
    --rojo: #e53935;
    --rojo-claro: #ffebee;
    --gris-oscuro: #1c2b1e;
    --gris: #4a5568;
    --gris-medio: #718096;
    --gris-claro: #f4f6f4;
    --blanco: #ffffff;
    --sombra: 0 2px 12px rgba(0,0,0,0.10);
    --sombra-fuerte: 0 4px 24px rgba(0,0,0,0.15);
    --text-primary: var(--gris-oscuro);
    --bg-card: #ffffff;
    --border-card: #e8f0e8;
    --header-bg: #ffffff;
    --header-border: #e2e8f0;
    --sidebar-bg: #1c2b1e;
    --sidebar-text: #ffffff;
    --topbar-bg: #1c2b1e;
    --topbar-text: #ffffff;
    --input-bg: #ffffff;
    --input-border: #d1dbd1;
  }

body.dark {
    --verde: #4caf50;
    --verde-medio: #66bb6a;
    --verde-claro: #81c784;
    --verde-suave: #1b3d1f;
    --naranja: #ffb74d;
    --rojo: #ef5350;
    --rojo-claro: #3d1a1a;
    --text-primary: #e8eaed;
    --gris: #b0b3b8;
    --gris-medio: #8a8d94;
    --gris-claro: #1a1a2e;
    --blanco: #c8cdd0;
    --sombra: 0 2px 12px rgba(0,0,0,0.30);
    --sombra-fuerte: 0 4px 24px rgba(0,0,0,0.40);
    --bg-card: #1e2a3a;
    --border-card: #2a3a4e;
    --header-bg: #16213e;
    --header-border: #2a3a4e;
    --sidebar-bg: #0a0e1a;
    --sidebar-text: #c8cdd0;
    --topbar-bg: #0a0e1a;
    --topbar-text: #c8cdd0;
    --input-bg: #1a2535;
    --input-border: #2a3a4e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--gris-claro);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
  }

  .topbar {
    background: var(--topbar-bg);
    color: var(--topbar-text);
    text-align: center;
    font-size: 12px;
    padding: 6px 20px;
    letter-spacing: 0.3px;
    transition: background 0.25s, color 0.25s;
  }

  .layout {
    display: flex;
    min-height: calc(100vh - 30px);
  }

  .sidebar {
    width: 220px;
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    padding: 0;
    flex-shrink: 0;
    transition: background 0.25s, color 0.25s;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 22px 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .brand-icon {
    width: 38px; height: 38px;
    background: var(--verde);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .brand-icon svg { width: 22px; height: 22px; fill: white; }

  .brand-text { line-height: 1.2; }
  .brand-text .t1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 13px; color: white; }
  .brand-text .t2 { font-size: 10px; color: var(--verde-claro); font-weight: 500; }

  .sidebar nav { padding: 12px 0; flex: 1; overflow-y: auto; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    transition: all 0.18s;
    border-left: 3px solid transparent;
    text-decoration: none;
  }
  .nav-item:hover { color: white; background: rgba(255,255,255,0.06); }
  .nav-item.active {
    color: white;
    border-left: 3px solid var(--verde-claro);
    background: rgba(76,175,80,0.12);
  }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11.5px;
    color: rgba(255,255,255,0.45);
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .header-left h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px; font-weight: 800;
    color: var(--text-primary);
  }
  .header-left p { font-size: 12px; color: var(--gris-medio); margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 14px; }

  .bell-btn {
    width: 36px; height: 36px;
    border: 1.5px solid var(--header-border);
    border-radius: 8px;
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
  }
  .bell-btn svg { width: 18px; height: 18px; stroke: var(--gris); fill: none; }
  .bell-dot {
    width: 8px; height: 8px;
    background: var(--rojo);
    border-radius: 50%;
    position: absolute; top: 5px; right: 5px;
    border: 1.5px solid var(--bg-card);
  }

  .user-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--verde-suave);
    border: 1.5px solid var(--border-card);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px; font-weight: 600; color: var(--verde);
  }
  .user-avatar {
    width: 26px; height: 26px;
    background: var(--verde);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 11px; font-weight: 700;
  }

  .content { padding: 24px 28px; flex: 1; overflow-y: auto; }

  .section-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .filtros {
    display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
  }

  .filtro-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #d1dbd1;
    background: white;
    font-size: 12px; font-weight: 600;
    color: var(--gris);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .filtro-btn:hover { border-color: var(--verde-claro); color: var(--verde); }
  .filtro-btn.active { background: var(--verde); color: white; border-color: var(--verde); }

  .alertas-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .alerta-item {
    background: white;
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: var(--sombra);
    border: 1px solid #e8f0e8;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: all 0.18s;
    border-left: 4px solid var(--gris-medio);
  }
  .alerta-item:hover { box-shadow: var(--sombra-fuerte); }
  .alerta-item.prioridad-Alta { border-left-color: var(--rojo); }
  .alerta-item.prioridad-Media { border-left-color: var(--naranja); }
  .alerta-item.prioridad-Baja { border-left-color: var(--verde-claro); }

  .alerta-icono {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .alerta-icono.alta { background: var(--rojo-claro); }
  .alerta-icono.media { background: #fff3e0; }
  .alerta-icono.baja { background: var(--verde-suave); }
  .alerta-icono svg { width: 20px; height: 20px; }

  .alerta-body { flex: 1; }
  .alerta-titulo { font-weight: 700; font-size: 14px; color: var(--text-primary); }
  .alerta-mensaje { font-size: 12px; color: var(--gris); margin-top: 3px; }
  .alerta-meta {
    display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap;
  }
  .alerta-meta span {
    font-size: 11px; color: var(--gris-medio);
    display: flex; align-items: center; gap: 4px;
  }
  .alerta-prioridad {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
  }
  .alerta-prioridad.alta { background: var(--rojo-claro); color: var(--rojo); }
  .alerta-prioridad.media { background: #fff3e0; color: #e65100; }
  .alerta-prioridad.baja { background: var(--verde-suave); color: var(--verde); }

  .sin-alertas {
    text-align: center;
    padding: 40px;
    color: var(--gris-medio);
  }
  .sin-alertas svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
  .sin-alertas h3 { font-size: 16px; margin-bottom: 4px; color: var(--gris); }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .filtros { gap: 6px; }
    .filtro-btn { font-size: 11px; padding: 5px 12px; }
  }
</style>
</head>
<body>
<script>
  try{document.body.classList.toggle('dark',localStorage.getItem('scsp_theme')==='dark')}catch(e){}
  window.location.href = 'analisis.html'
</script>

<div class="topbar">
  Santa Cruz Segura Predictiva: plataforma web con IA para la anticipación colaborativa del delito en barrios
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>
      </div>
      <div class="brand-text">
        <div class="t1">Santa Cruz<br>Segura Predictiva</div>
        <div class="t2">Plataforma IA</div>
      </div>
    </div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <strong style="color:rgba(255,255,255,0.7)">Junta Vecinal</strong><br>San Pedro
    </div>
  </aside>

  <main class="main">

    <div class="header">
      <div class="header-left">
        <h1>Alertas de seguridad</h1>
        <p>Notificaciones y alertas del sistema</p>
      </div>
      <div class="header-right">
        <div class="bell-btn" onclick="location.href='analisis.html'" style="cursor:pointer;">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="bell-dot" id="notifDot" style="display:none;"></span>
        </div>
        <div class="user-badge" id="userBadge">
          <div class="user-avatar" style="background:var(--verde);">...</div>
          <span>Cargando...</span>
        </div>
      </div>
    </div>

    <div class="content">

      <div class="filtros" id="filtros">
        <button class="filtro-btn active" data-filtro="todas" onclick="filtrarAlertas('todas')">Todas</button>
        <button class="filtro-btn" data-filtro="Alta" onclick="filtrarAlertas('Alta')">Alta prioridad</button>
        <button class="filtro-btn" data-filtro="Media" onclick="filtrarAlertas('Media')">Media prioridad</button>
        <button class="filtro-btn" data-filtro="Baja" onclick="filtrarAlertas('Baja')">Baja prioridad</button>
      </div>

      <div class="section-title">Historial de alertas</div>
      <div class="alertas-grid" id="alertasContainer">
        <div class="sin-alertas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h3>Cargando alertas...</h3>
        </div>
      </div>

    </div>
  </main>

</div>

<script>
  let todasAlertas = []

  async function cargarAlertas() {
    try {
      const res = await apiFetch('/api/alertas')
      todasAlertas = await res.json()
      renderizarAlertas('todas')
    } catch (e) {
      console.error('Error al cargar alertas:', e)
      document.getElementById('alertasContainer').innerHTML = `
        <div class="sin-alertas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h3>Error al cargar alertas</h3>
          <p>Verifica la conexión con el servidor.</p>
        </div>`
    }
  }

  function renderizarAlertas(filtro) {
    const container = document.getElementById('alertasContainer')
    const filtradas = filtro === 'todas' ? todasAlertas : todasAlertas.filter(a => a.prioridad === filtro)

    if (filtradas.length === 0) {
      container.innerHTML = `
        <div class="sin-alertas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h3>No hay alertas</h3>
          <p>${filtro === 'todas' ? 'No se registraron alertas en el sistema.' : 'No hay alertas con esta prioridad.'}</p>
        </div>`
      return
    }

    container.innerHTML = filtradas.map(a => {
      const prioridad = (a.prioridad || 'Baja').toLowerCase()
      const canalIcono = a.canal === 'SMS' ? '📱' : a.canal === 'Email' ? '✉️' : '🔔'
      const fecha = a.fecha ? new Date(a.fecha).toLocaleString('es-BO') : ''
      return `
        <div class="alerta-item prioridad-${a.prioridad || 'Baja'}">
          <div class="alerta-icono ${prioridad}">
            <svg viewBox="0 0 24 24" fill="none" stroke="${prioridad === 'alta' ? '#e53935' : prioridad === 'media' ? '#e65100' : '#2d8a47'}" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <div class="alerta-body">
            <div class="alerta-titulo">${a.titulo || 'Alerta'}</div>
            <div class="alerta-mensaje">${a.mensaje || ''}</div>
            <div class="alerta-meta">
              <span>${canalIcono} ${a.canal || 'App'}</span>
              <span>📅 ${fecha}</span>
              <span class="alerta-prioridad ${prioridad}">${a.prioridad || 'Baja'}</span>
            </div>
          </div>
        </div>`
    }).join('')
  }

  function filtrarAlertas(filtro) {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'))
    document.querySelector(`.filtro-btn[data-filtro="${filtro}"]`).classList.add('active')
    renderizarAlertas(filtro)
  }

  document.addEventListener('DOMContentLoaded', cargarAlertas)
</script>
<script src="js/auth.js"></script>
<script>
  verificarSesion().then(async function(session) {
    if (session) {
      verificarAcceso()
      generarSidebar()
      await new Promise(r => setTimeout(r, 300))
      actualizarHeaderUsuario()
    } else {
      window.location.href = 'login.html'
    }
  })
</script>
</body>
</html>
